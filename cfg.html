<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Inter,sans-serif;
      background:#05070a;
      color:white;
      overflow-x:hidden;
      animation:fadePage .6s ease;
    }

    @keyframes fadePage{
      from{ opacity:0; transform:translateY(10px); }
      to{ opacity:1; transform:translateY(0); }
    }

    .bg{
      position:fixed;
      inset:0;
      z-index:-5;
      overflow:hidden;
    }

    .light{
      position:absolute;
      width:700px;
      height:700px;
      border-radius:50%;
      filter:blur(160px);
      opacity:.35;
      mix-blend-mode:screen;
      animation:float 18s ease-in-out infinite alternate;
    }

    .light1{
      background:#4f7cff;
      top:-120px;
      left:-80px;
    }

    .light2{
      background:#ff3c82;
      bottom:-160px;
      right:-120px;
      animation-duration:22s;
    }

    .light3{
      background:#7c3aed;
      top:40%;
      left:55%;
      animation-duration:26s;
      opacity:.25;
    }

    @keyframes float{
      0%{ transform:translate(0,0) scale(1); }
      100%{ transform:translate(60px,-40px) scale(1.2); }
    }

    .vignette{
      position:fixed;
      inset:0;
      background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,.7) 100%);
      z-index:-4;
      pointer-events:none;
    }

    .grain{
      position:fixed;
      inset:0;
      opacity:.04;
      z-index:-3;
      pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.8' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='400' height='400' filter='url(%23n)' opacity='.35'/%3E%3C/svg%3E");
    }

    .cursor-glow{
      position:fixed;
      width:360px;
      height:360px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(100,140,255,.18), rgba(100,140,255,0) 70%);
      pointer-events:none;
      z-index:-2;
      mix-blend-mode:screen;
      transition:transform .07s linear;
    }

    .container{
      width:1100px;
      margin:auto;
      padding:70px 0 100px;
    }

    .label{
      font-size:12px;
      letter-spacing:3px;
      opacity:.4;
      margin-bottom:10px;
      text-transform:uppercase;
    }

    h1{
      font-size:70px;
      margin:0;
      letter-spacing:-2px;
    }

    .subtitle{
      margin-top:10px;
      opacity:.78;
      font-size:18px;
      font-weight:600;
    }

    .section-title{
      margin:70px 0 24px;
      font-size:24px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:25px;
    }

    .card{
      background:#0b1118;
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.05);
      transition:.35s cubic-bezier(.2,.8,.2,1);
    }

    .card:hover{
      transform:translateY(-8px);
      border:1px solid rgba(255,255,255,.15);
      box-shadow:0 30px 60px rgba(0,0,0,.45);
    }

    .thumb{
      height:320px;
      overflow:hidden;
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:transform .6s ease;
      display:block;
    }

    .card:hover img{
      transform:scale(1.05);
    }

    .info{
      padding:18px;
    }

    .info h3{
      margin:0;
      font-size:18px;
      font-weight:800;
    }

    .info p{
      margin-top:6px;
      opacity:.6;
      font-size:13px;
    }

    .reveal{
      opacity:0;
      transform:translateY(40px);
      transition:.8s ease;
    }

    .reveal.active{
      opacity:1;
      transform:translateY(0);
    }

    .back{
      margin-top:40px;
      display:inline-block;
      padding:12px 18px;
      border-radius:14px;
      background:#0f1620;
      border:1px solid rgba(255,255,255,.07);
      text-decoration:none;
      color:white;
      opacity:.8;
      transition:.25s;
    }

    .back:hover{
      opacity:1;
      transform:translateY(-2px);
      border-color:rgba(255,255,255,.16);
    }

    @media(max-width:900px){
      .container{ width:90%; }
      .grid{ grid-template-columns:repeat(2,1fr); }
    }

    @media(max-width:600px){
      .grid{ grid-template-columns:1fr; }
      h1{ font-size:44px; }
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="light light1"></div>
    <div class="light light2"></div>
    <div class="light light3"></div>
  </div>

  <div class="vignette"></div>
  <div class="grain"></div>
  <div class="cursor-glow"></div>

  <div class="container">
    <div class="label">Project Group</div>
    <h1>CFG</h1>
    <div class="subtitle">Campaign POSM Series</div>

    <div class="section-title">Project Items</div>

    <div class="grid">
      <div class="card reveal">
        <div class="thumb">
          <img src="work1.jpg.png" alt="CFG Aisle Fin">
        </div>
        <div class="info">
          <h3>CFG</h3>
          <p>Aisle Fin</p>
        </div>
      </div>

      <div class="card reveal">
        <div class="thumb">
          <img src="work2.jpg.png" alt="CFG Sampling Stand">
        </div>
        <div class="info">
          <h3>CFG</h3>
          <p>Sampling Stand</p>
        </div>
      </div>

      <div class="card reveal">
        <div class="thumb">
          <img src="work3.jpg.png" alt="CFG Wobbler">
        </div>
        <div class="info">
          <h3>CFG</h3>
          <p>Wobbler</p>
        </div>
      </div>

      <div class="card reveal">
        <div class="thumb">
          <img src="work4.jpg.png" alt="CFG Table Display">
        </div>
        <div class="info">
          <h3>CFG</h3>
          <p>Table Display</p>
        </div>
      </div>

      <div class="card reveal">
        <div class="thumb">
          <img src="work5.jpg.png" alt="CFG Shelf Visual">
        </div>
        <div class="info">
          <h3>CFG</h3>
          <p>Shelf Visual</p>
        </div>
      </div>

      <div class="card reveal">
        <div class="thumb">
          <img src="work6.jpg.png" alt="CFG Banner">
        </div>
        <div class="info">
          <h3>CFG</h3>
          <p>Banner</p>
        </div>
      </div>

      <div class="card reveal">
        <div class="thumb">
          <img src="work7.jpg.png" alt="CFG Poster Stand">
        </div>
        <div class="info">
          <h3>CFG</h3>
          <p>Poster Stand</p>
        </div>
      </div>

      <div class="card reveal">
        <div class="thumb">
          <img src="work8.jpg.png" alt="CFG Poster">
        </div>
        <div class="info">
          <h3>CFG</h3>
          <p>Poster</p>
        </div>
      </div>

      <div class="card reveal">
        <div class="thumb">
          <img src="work9.jpg.png" alt="CFG Poster">
        </div>
        <div class="info">
          <h3>CFG</h3>
          <p>Poster</p>
        </div>
      </div>
    </div>

    <a href="index.html" class="back">← Back</a>
  </div>

  <script>
    const glow=document.querySelector(".cursor-glow");
    document.addEventListener("mousemove",(e)=>{
      glow.style.transform=`translate(${e.clientX-180}px,${e.clientY-180}px)`;
    });

    const reveals=document.querySelectorAll(".reveal");
    const runReveal=()=>{
      reveals.forEach(el=>{
        const top=el.getBoundingClientRect().top;
        if(top < window.innerHeight-60){
          el.classList.add("active");
        }
      });
    };
    runReveal();
    window.addEventListener("scroll",runReveal);
  </script>
</body>
</html>
