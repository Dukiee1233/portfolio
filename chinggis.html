<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chinggis Beer Project</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">Project Group</p>
      <h1>Chinggis Beer</h1>
      <p class="subtitle">Campaign Visual Series</p>
      <p class="intro">
        Key visual, poster, POSM, promotion materials.
      </p>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <div class="section-head">
        <h2>Project Items</h2>
      </div>

      <div class="grid">

        <div class="card" onclick="openModal('CB work1.jpg.jpg')">
          <img src="CB work1.jpg.jpg" alt="Chinggis Beer Key Visual">
          <div class="card-info">
            <h3>Chinggis Beer</h3>
            <p>Key Visual</p>
          </div>
        </div>

        <div class="card" onclick="openModal('CB work2.jpg.png')">
          <img src="CB work2.jpg.png" alt="Chinggis Beer Poster">
          <div class="card-info">
            <h3>Chinggis Beer</h3>
            <p>Poster</p>
          </div>
        </div>

        <div class="card" onclick="openModal('CB work3.jpg.png')">
          <img src="CB work3.jpg.png" alt="Chinggis Beer Poster">
          <div class="card-info">
            <h3>Chinggis Beer</h3>
            <p>Poster</p>
          </div>
        </div>

        <div class="card" onclick="openModal('CB work4.jpg.jpg')">
          <img src="CB work4.jpg.jpg" alt="Chinggis Beer Billboard">
          <div class="card-info">
            <h3>Chinggis Beer</h3>
            <p>Billboard</p>
          </div>
        </div>

        <div class="card" onclick="openModal('CB work5.jpg.jpg')">
          <img src="CB work5.jpg.jpg" alt="Chinggis Beer POSM">
          <div class="card-info">
            <h3>Chinggis Beer</h3>
            <p>POSM</p>
          </div>
        </div>

        <div class="card" onclick="openModal('CB work6.jpg.jpg')">
          <img src="CB work6.jpg.jpg" alt="Chinggis Beer Promotion">
          <div class="card-info">
            <h3>Chinggis Beer</h3>
            <p>Promotion</p>
          </div>
        </div>

      </div>

      <div class="back-wrap">
        <a href="index.html" class="back-link">← Back to portfolio</a>
      </div>
    </section>
  </main>

  <div id="modal" class="modal" onclick="closeModal()">
    <img id="modalImg" src="" alt="Preview">
  </div>

  <script>
    function openModal(src) {
      document.getElementById("modal").style.display = "flex";
      document.getElementById("modalImg").src = src;
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }
  </script>

</body>
</html>
