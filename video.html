<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video</title>

<link rel="stylesheet" href="style.css">

<style>

.container{
max-width:1200px;
margin:auto;
padding:80px 20px;
}

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:40px;
margin-top:60px;
}

.video-card{
border-radius:18px;
overflow:hidden;
background:#111;
border:1px solid #222;
padding:20px;
transition:.3s;
}

.video-card:hover{
transform:translateY(-6px);
border:1px solid #333;
}

iframe{
width:100%;
height:520px;
border:none;
border-radius:12px;
background:black;
}

h1{
font-size:48px;
margin-bottom:10px;
}

p{
color:#888;
}

</style>

</head>



<body>



<div class="container">

<h1>Video</h1>

<p>Reel / Motion / Animation</p>



<div class="video-grid">



<!-- reel 1 -->

<div class="video-card">

<iframe
src="https://www.instagram.com/reel/DPfpz0sFDvs/embed"
allowfullscreen>
</iframe>

<p>Instagram Reel</p>

</div>



<!-- reel 2 -->

<div class="video-card">

<iframe
src="https://www.instagram.com/reel/DP2s2bnkueh/embed"
allowfullscreen>
</iframe>

<p>Instagram Reel</p>

</div>



<!-- reel 3 -->

<div class="video-card">

<iframe
src="https://www.instagram.com/reel/DPLDtrxEgX_/embed"
allowfullscreen>
</iframe>

<p>Instagram Reel</p>

</div>



<!-- reel 4 -->

<div class="video-card">

<iframe
src="https://www.instagram.com/reel/DOdOYDWEvlo/embed"
allowfullscreen>
</iframe>

<p>Instagram Reel</p>

</div>



</div>

</div>



</body>

</html>
