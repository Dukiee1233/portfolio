<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG Reel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Inter,sans-serif;
      background:#05070a;
      color:white;
      overflow-x:hidden;
    }

    .bg{
      position:fixed;
      inset:0;
      z-index:-5;
      overflow:hidden;
    }

    .light{
      position:absolute;
      width:700px;
      height:700px;
      border-radius:50%;
      filter:blur(160px);
      opacity:.35;
      mix-blend-mode:screen;
      animation:float 18s ease-in-out infinite alternate;
    }

    .light1{
      background:#4f7cff;
      top:-120px;
      left:-80px;
    }

    .light2{
      background:#ff3c82;
      bottom:-160px;
      right:-120px;
      animation-duration:22s;
    }

    .light3{
      background:#7c3aed;
      top:40%;
      left:55%;
      animation-duration:26s;
      opacity:.25;
    }

    @keyframes float{
      0%{
        transform:translate(0,0) scale(1);
      }
      100%{
        transform:translate(60px,-40px) scale(1.2);
      }
    }

    .vignette{
      position:fixed;
      inset:0;
      background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,.7) 100%);
      z-index:-4;
    }

    .cursor-glow{
      position:fixed;
      width:360px;
      height:360px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(100,140,255,.18), rgba(100,140,255,0) 70%);
      pointer-events:none;
      z-index:-2;
      mix-blend-mode:screen;
      transition:transform .07s linear;
    }

    .container{
      width:1100px;
      margin:auto;
      padding:60px 0 80px;
    }

    h1{
      font-size:44px;
      margin:0 0 14px;
      letter-spacing:-.02em;
    }

    .subtitle{
      margin:0 0 30px;
      opacity:.6;
      font-size:15px;
    }

    .video-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:24px;
    }

    .video-card{
      background:#0b1118;
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.05);
      transition:.25s;
    }

    .video-card:hover{
      transform:translateY(-6px);
      border:1px solid rgba(255,255,255,.15);
      box-shadow:0 20px 45px rgba(0,0,0,.35);
    }

    .video-stage{
      position:relative;
      aspect-ratio:9/16;
      background:#111;
      overflow:hidden;
    }

    .video-cover{
      position:absolute;
      inset:0;
      cursor:pointer;
    }

    .video-cover img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transition:.35s;
    }

    .video-card:hover .video-cover img{
      transform:scale(1.04);
    }

    .play-btn{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      width:80px;
      height:80px;
      border-radius:50%;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(8px);
    }

    .play-btn::after{
      content:"";
      width:0;
      height:0;
      border-left:20px solid white;
      border-top:12px solid transparent;
      border-bottom:12px solid transparent;
      margin-left:4px;
    }

    .inline-frame{
      width:100%;
      height:100%;
      border:none;
      display:none;
      background:#000;
    }

    .video-info{
      padding:18px;
    }

    .video-info h3{
      margin:0;
      font-size:17px;
      font-weight:800;
    }

    .video-info p{
      margin:8px 0 0;
      font-size:13px;
      opacity:.6;
    }

    .back-wrap{
      margin-top:28px;
    }

    .back-link{
      display:inline-block;
      text-decoration:none;
      color:#fff;
      font-size:15px;
      opacity:.8;
      padding:12px 18px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      transition:.25s ease;
    }

    .back-link:hover{
      opacity:1;
      transform:translateY(-2px);
      border-color:rgba(255,255,255,.16);
      background:rgba(255,255,255,.05);
    }

    @media(max-width:900px){
      .container{
        width:90%;
      }

      .video-grid{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media(max-width:600px){
      .video-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

  <div class="bg">
    <div class="light light1"></div>
    <div class="light light2"></div>
    <div class="light light3"></div>
  </div>

  <div class="vignette"></div>
  <div class="cursor-glow"></div>

  <div class="container">
    <h1>IG Reel</h1>
    <p class="subtitle">Mobicom reel covers and motion works.</p>

    <div class="video-grid">

      <div class="video-card">
        <div class="video-stage">
          <div class="video-cover" id="cover1" onclick="playVideo('frame1','cover1','https://www.instagram.com/reel/DPfpz0sFDvs/embed')">
            <img src="mb1.jpg.jpeg" alt="IG Reel 01">
            <div class="play-btn"></div>
          </div>
          <iframe id="frame1" class="inline-frame" allowfullscreen></iframe>
        </div>
        <div class="video-info">
          <h3>Mobicom 1</h3>
          <p>IG Reel 01</p>
        </div>
      </div>

      <div class="video-card">
        <div class="video-stage">
          <div class="video-cover" id="cover2" onclick="playVideo('frame2','cover2','https://www.instagram.com/reel/DP2s2bnkueh/embed')">
            <img src="mb2.jpg.jpeg" alt="IG Reel 02">
            <div class="play-btn"></div>
          </div>
          <iframe id="frame2" class="inline-frame" allowfullscreen></iframe>
        </div>
        <div class="video-info">
          <h3>Mobicom 2</h3>
          <p>IG Reel 02</p>
        </div>
      </div>

      <div class="video-card">
        <div class="video-stage">
          <div class="video-cover" id="cover3" onclick="playVideo('frame3','cover3','https://www.instagram.com/reel/DPLDtrxEgX_/embed')">
            <img src="mb3.jpg.jpg" alt="IG Reel 03">
            <div class="play-btn"></div>
          </div>
          <iframe id="frame3" class="inline-frame" allowfullscreen></iframe>
        </div>
        <div class="video-info">
          <h3>Mobicom 3</h3>
          <p>IG Reel 03</p>
        </div>
      </div>

      <div class="video-card">
        <div class="video-stage">
          <div class="video-cover" id="cover4" onclick="playVideo('frame4','cover4','https://www.instagram.com/reel/DOdOYDWEvlo/embed')">
            <img src="mb4.jpg.jpg" alt="IG Reel 04">
            <div class="play-btn"></div>
          </div>
          <iframe id="frame4" class="inline-frame" allowfullscreen></iframe>
        </div>
        <div class="video-info">
          <h3>Mobicom 4</h3>
          <p>IG Reel 04</p>
        </div>
      </div>

    </div>

    <div class="back-wrap">
      <a href="video.html" class="back-link">← Back to Video</a>
    </div>
  </div>

  <script>
    const glow = document.querySelector(".cursor-glow");

    document.addEventListener("mousemove",(e)=>{
      glow.style.transform = `translate(${e.clientX-180}px,${e.clientY-180}px)`;
    });

    function playVideo(frameId, coverId, url){
      document.getElementById(frameId).src = url;
      document.getElementById(frameId).style.display = "block";
      document.getElementById(coverId).style.display = "none";
    }
  </script>

</body>
</html>
