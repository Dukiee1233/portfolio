<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IG Reel</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

.video-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:24px;
margin-top:40px;
}

.video-card{
background:#0d0f12;
border:1px solid rgba(255,255,255,0.08);
border-radius:22px;
overflow:hidden;
}

.video-stage{
position:relative;
aspect-ratio:9/16;
background:#111;
}

.video-cover{
position:absolute;
inset:0;
cursor:pointer;
}

.video-cover img{
width:100%;
height:100%;
object-fit:cover;
}

.play-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70px;
height:70px;
border-radius:50%;
background:rgba(255,255,255,.15);
display:flex;
align-items:center;
justify-content:center;
}

.play-btn:after{
content:"";
border-left:18px solid white;
border-top:12px solid transparent;
border-bottom:12px solid transparent;
margin-left:4px;
}

iframe{
width:100%;
height:100%;
border:none;
display:none;
}

.video-info{
padding:16px;
}

.video-info h3{
margin:0;
font-size:18px;
}

.video-info p{
margin-top:6px;
color:#888;
font-size:14px;
}

@media(max-width:900px){
.video-grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:600px){
.video-grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<header class="hero">
<div class="hero-inner">

<p class="eyebrow">Video</p>
<h1>IG Reel</h1>

<p class="subtitle">
Instagram reel motion works
</p>

</div>
</header>



<main class="container">

<section class="section">

<div class="video-grid">



<!-- reel 1 -->

<div class="video-card">

<div class="video-stage">

<div class="video-cover"
onclick="playVideo('frame1','cover1','https://www.instagram.com/reel/DPfpz0sFDvs/embed')"
id="cover1">

<img src="video1-cover.jpg">

<div class="play-btn"></div>

</div>

<iframe id="frame1"></iframe>

</div>

<div class="video-info">

<h3>IG Reel 01</h3>
<p>Motion Visual</p>

</div>

</div>



<!-- reel 2 -->

<div class="video-card">

<div class="video-stage">

<div class="video-cover"
onclick="playVideo('frame2','cover2','https://www.instagram.com/reel/DP2s2bnkueh/embed')"
id="cover2">

<img src="video1-cover.jpg">

<div class="play-btn"></div>

</div>

<iframe id="frame2"></iframe>

</div>

<div class="video-info">

<h3>IG Reel 02</h3>
<p>Smart Education</p>

</div>

</div>



<!-- reel 3 -->

<div class="video-card">

<div class="video-stage">

<div class="video-cover"
onclick="playVideo('frame3','cover3','https://www.instagram.com/reel/DPLDtrxEgX_/embed')"
id="cover3">

<img src="video1-cover.jpg">

<div class="play-btn"></div>

</div>

<iframe id="frame3"></iframe>

</div>

<div class="video-info">

<h3>IG Reel 03</h3>
<p>Tech Week</p>

</div>

</div>



<!-- reel 4 -->

<div class="video-card">

<div class="video-stage">

<div class="video-cover"
onclick="playVideo('frame4','cover4','https://www.instagram.com/reel/DOdOYDWEvlo/embed')"
id="cover4">

<img src="video1-cover.jpg">

<div class="play-btn"></div>

</div>

<iframe id="frame4"></iframe>

</div>

<div class="video-info">

<h3>IG Reel 04</h3>
<p>Social Campaign</p>

</div>

</div>



</div>



<div class="back-wrap">

<a href="video.html" class="back-link">
← Back to Video
</a>

</div>



</section>

</main>



<script>

function playVideo(frameId,coverId,url){

document.getElementById(frameId).src=url
document.getElementById(frameId).style.display="block"

document.getElementById(coverId).style.display="none"

}

</script>



</body>
</html>
