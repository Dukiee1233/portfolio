<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dukiee Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* ---------- base ---------- */

body{
margin:0;
font-family:Inter,sans-serif;
background:#05070a;
color:white;
overflow-x:hidden;

/* pikachu cursor */
cursor:url("pikachu-cursor.png") 16 16, auto;
}

a{
text-decoration:none;
color:inherit;
}

.container{
width:1100px;
margin:auto;
padding:40px 0 80px;
}

/* ---------- gradient animated BG ---------- */

.bg1{
position:fixed;
width:700px;
height:700px;
background:radial-gradient(circle,#ff3c3c,#4d2bff);
filter:blur(170px);
opacity:.35;
top:50%;
left:65%;
transform:translate(-50%,-50%);
z-index:-2;
animation:bgMove1 14s ease-in-out infinite alternate;
}

.bg2{
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,#1e90ff,#ff0080);
filter:blur(140px);
opacity:.25;
top:20%;
left:20%;
z-index:-2;
animation:bgMove2 18s ease-in-out infinite alternate;
}

@keyframes bgMove1{
0%{ transform:translate(-50%,-50%) scale(1);}
100%{ transform:translate(-40%,-60%) scale(1.25);}
}

@keyframes bgMove2{
0%{ transform:translate(0,0) scale(1);}
100%{ transform:translate(60px,80px) scale(1.15);}
}

/* ---------- hero ---------- */

.hero{
margin-bottom:40px;
}

.hero h1{
font-size:64px;
font-weight:800;
margin:0;

background:linear-gradient(90deg,#ffffff,#9aa4b2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:8px;
color:#9aa4b2;
}

/* ---------- grid ---------- */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:28px;
}

/* ---------- cards ---------- */

.card{
background:#0b1118;
border-radius:18px;
overflow:hidden;
transition:.3s;
position:relative;
border:1px solid rgba(255,255,255,.05);
}

.card:hover{
transform:translateY(-6px);
border:1px solid rgba(255,255,255,.15);
}

.card img{
width:100%;
height:230px;
object-fit:cover;
display:block;
}

.card-content{
padding:18px;
}

.card h3{
margin:0;
font-size:18px;
}

.card p{
margin-top:6px;
font-size:13px;
color:#8a94a6;
}

/* ---------- play icon ---------- */

.play-icon{
position:absolute;
bottom:18px;
right:18px;

width:42px;
height:42px;

border-radius:50%;

background:rgba(255,255,255,.08);

display:flex;
align-items:center;
justify-content:center;

backdrop-filter:blur(10px);
}

.play-icon::after{
content:"▶";
font-size:14px;
margin-left:3px;
}

/* ---------- contact ---------- */

.contact{
margin-top:70px;
padding:35px;

border-radius:20px;

background:linear-gradient(180deg,#0b1118,#06090f);

border:1px solid rgba(255,255,255,.06);

box-shadow:
0 0 0 1px rgba(255,255,255,.03),
0 20px 60px rgba(0,0,0,.6);
}

.contact h2{
margin-top:0;
margin-bottom:20px;
}

.contact-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.contact-box{

background:#0b1118;

padding:18px;

border-radius:12px;

border:1px solid rgba(255,255,255,.05);

transition:.25s;
}

.contact-box:hover{
border:1px solid rgba(255,255,255,.15);
}

.contact-box span{

font-size:12px;

color:#667085;

display:block;

margin-bottom:6px;
}

.contact-box strong{

font-size:14px;

color:#fff;
}

/* ---------- responsive ---------- */

@media(max-width:900px){

.container{
width:92%;
}

.grid{
grid-template-columns:1fr;
}

.contact-grid{
grid-template-columns:1fr;
}

.hero h1{
font-size:38px;
}

}

</style>

</head>



<body>

</body>
</html>
