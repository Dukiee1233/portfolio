<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter,sans-serif;
background:#05070a;
color:white;
overflow-x:hidden;
}


/* glow cursor */
.cursor-glow{
position:fixed;
width:420px;
height:420px;
border-radius:50%;

background:
radial-gradient(circle,
rgba(80,120,255,.18),
rgba(80,120,255,0) 70%
);

pointer-events:none;
z-index:-1;

transition:transform .08s linear;

mix-blend-mode:screen;
}


/* gradient background */

.bg1,
.bg2,
.bg3{
position:fixed;
border-radius:50%;
filter:blur(140px);
z-index:-3;
}

.bg1{
width:680px;
height:680px;

background:rgba(75,120,255,.22);

top:-120px;
left:-120px;

animation:bgMove1 14s ease-in-out infinite alternate;
}

.bg2{
width:620px;
height:620px;

background:rgba(170,70,255,.18);

bottom:-180px;
right:-120px;

animation:bgMove2 18s ease-in-out infinite alternate;
}

.bg3{
width:500px;
height:500px;

background:rgba(255,60,120,.12);

top:45%;
left:60%;

animation:bgMove3 20s ease-in-out infinite alternate;
}

@keyframes bgMove1{

0%{ transform:translate(0,0) scale(1); }

100%{ transform:translate(60px,-30px) scale(1.1); }

}

@keyframes bgMove2{

0%{ transform:translate(0,0) scale(1); }

100%{ transform:translate(-40px,40px) scale(1.15); }

}

@keyframes bgMove3{

0%{ transform:translate(0,0) scale(1); }

100%{ transform:translate(-60px,-20px) scale(1.1); }

}


/* subtle pikachu overlay */

.pikachu{
position:fixed;

right:6%;
bottom:4%;

width:420px;

opacity:.05;

filter:
blur(1px)
drop-shadow(0 0 40px rgba(255,220,80,.15));

pointer-events:none;

z-index:-2;

animation:pikaFloat 10s ease-in-out infinite alternate;
}

@keyframes pikaFloat{

from{
transform:translateY(0px) rotate(-2deg);
opacity:.04;
}

to{
transform:translateY(-14px) rotate(2deg);
opacity:.07;
}

}


/* layout */

.container{
width:1100px;
margin:auto;
padding:60px 0 80px;
}


/* hero */

.hero{
margin-bottom:40px;
}

.hero small{

letter-spacing:.25em;

opacity:.5;

font-size:11px;

text-transform:uppercase;
}

.hero h1{

font-size:72px;

margin:8px 0;

letter-spacing:-.04em;

font-weight:900;
}

.hero p{

opacity:.6;

max-width:520px;

line-height:1.7;
}


/* grid */

.grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:28px;
}


/* cards */

.card{

background:#0b1118;

border-radius:20px;

overflow:hidden;

border:1px solid rgba(255,255,255,.05);

transition:.25s;

position:relative;

text-decoration:none;

color:white;
}

.card:hover{

transform:translateY(-6px);

border:1px solid rgba(255,255,255,.15);

box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.card img{

width:100%;

height:230px;

object-fit:cover;

display:block;
}

.info{

padding:18px;
}

.info h3{

margin:0;

font-size:18px;
}

.info p{

margin-top:6px;

font-size:13px;

opacity:.6;
}


/* play icon */

.play{

position:absolute;

bottom:18px;
right:18px;

width:46px;
height:46px;

border-radius:50%;

background:rgba(255,255,255,.1);

display:flex;
align-items:center;
justify-content:center;

backdrop-filter:blur(8px);
}

.play:after{

content:"";

border-left:14px solid white;

border-top:9px solid transparent;
border-bottom:9px solid transparent;

margin-left:4px;
}


/* contact */

.contact{

margin-top:70px;

padding:35px;

border-radius:22px;

background:

linear-gradient(
180deg,
rgba(18,24,32,.96),
rgba(10,14,20,.96)
);

border:1px solid rgba(255,255,255,.06);

box-shadow:

0 20px 60px rgba(0,0,0,.4);
}

.contact small{

opacity:.5;

letter-spacing:.2em;

font-size:11px;
}

.contact h2{

margin:10px 0 25px;

font-size:28px;
}

.contact-grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:18px;
}

.box{

background:rgba(255,255,255,.03);

padding:18px;

border-radius:14px;

border:1px solid rgba(255,255,255,.05);

transition:.2s;
}

.box:hover{

border:1px solid rgba(255,255,255,.15);

transform:translateY(-3px);
}

.box span{

font-size:12px;

opacity:.5;
}

.box strong{

display:block;

margin-top:6px;
}


/* responsive */

@media(max-width:900px){

.container{
width:90%;
}

.grid{
grid-template-columns:1fr;
}

.contact-grid{
grid-template-columns:1fr;
}

.hero h1{
font-size:42px;
}

}

</style>

</head>
