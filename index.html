<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dukiee Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* ---------- base ---------- */

body{
margin:0;
font-family:Inter,sans-serif;
background:#05070a;
color:white;
overflow-x:hidden;

/* pikachu cursor */
cursor:url("pikachu-cursor.png") 16 16, auto;
}

a{
text-decoration:none;
color:inherit;
}

.container{
width:1100px;
margin:auto;
padding:40px 0;
}

/* ---------- animated background ---------- */

.bg-blur{
position:fixed;
width:600px;
height:600px;
background:radial-gradient(circle,#ff3c3c,#4d2bff);
filter:blur(160px);
opacity:.35;
top:40%;
left:55%;
transform:translate(-50%,-50%);
z-index:-1;
animation:moveBg 12s ease-in-out infinite alternate;
}

@keyframes moveBg{
0%{ transform:translate(-50%,-50%) scale(1); }
100%{ transform:translate(-40%,-60%) scale(1.2); }
}

/* ---------- header ---------- */

.hero{
margin-bottom:40px;
}

.hero h1{
font-size:56px;
font-weight:800;
margin:0;
background:linear-gradient(90deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
color:#aaa;
margin-top:10px;
}

/* ---------- grid ---------- */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:28px;
}

/* ---------- card ---------- */

.card{
background:#0b1118;
border-radius:18px;
overflow:hidden;
transition:.3s;
position:relative;
border:1px solid rgba(255,255,255,.05);
}

.card:hover{
transform:translateY(-6px);
border:1px solid rgba(255,255,255,.15);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.card-content{
padding:18px;
}

.card h3{
margin:0;
font-size:18px;
}

.card p{
margin:6px 0 0;
font-size:13px;
color:#888;
}

/* ---------- video icon ---------- */

.play-icon{
position:absolute;
bottom:18px;
right:18px;
width:42px;
height:42px;
border-radius:50%;
background:rgba(255,255,255,.08);
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(10px);
}

.play-icon::after{
content:"▶";
font-size:14px;
margin-left:3px;
}

/* ---------- contact ---------- */

.contact{
margin-top:70px;
padding:30px;
border-radius:18px;
background:linear-gradient(180deg,#0b1118,#070b10);
border:1px solid rgba(255,255,255,.05);
}

.contact h2{
margin-top:0;
margin-bottom:20px;
}

.contact-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.contact-box{
background:#0b1118;
padding:16px;
border-radius:12px;
border:1px solid rgba(255,255,255,.05);
}

.contact-box span{
font-size:12px;
color:#777;
display:block;
margin-bottom:5px;
}

.contact-box strong{
font-size:14px;
}

/* ---------- responsive ---------- */

@media(max-width:900px){

.container{
width:90%;
}

.grid{
grid-template-columns:1fr;
}

.contact-grid{
grid-template-columns:1fr;
}

.hero h1{
font-size:36px;
}

}

</style>

</head>


<body>

<div class="bg-blur"></div>

<div class="container">

<!-- hero -->
<div class="hero">

<h1>Dukiee</h1>
<p>Video Editor, Graphic Designer</p>

</div>


<!-- projects -->
<div class="grid">

<a class="card" href="#">

<img src="cfg.jpg">

<div class="card-content">

<p>Campaign Design Series</p>
</div>

</a>



<a class="card" href="#">

<img src="mobicom.jpg">

<div class="card-content">
<h3>Mobicom</h3>
<p>Social Campaign Series</p>
</div>

</a>



<a class="card" href="video.html">

<img src="video-cover.jpg.jpg">

<div class="card-content">
<h3>Video</h3>
<p>Reel / Motion</p>
</div>

<div class="play-icon"></div>

</a>


</div>

</div>

</body>
</html>
