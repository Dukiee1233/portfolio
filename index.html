<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dukiee Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter, sans-serif;
  background:#05070a;
  color:white;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-size:56px;
  margin-bottom:10px;
}

.subtitle{
  opacity:.7;
  margin-bottom:50px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
}

.card{
  text-decoration:none;
  color:white;
  background:#0c1117;
  border-radius:18px;
  overflow:hidden;
  transition:.25s;
  border:1px solid rgba(255,255,255,.06);
}

.card:hover{
  transform:translateY(-6px);
  border:1px solid rgba(255,255,255,.15);
}

.thumb{
  aspect-ratio:4/3;
  background:#111;
  overflow:hidden;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.info{
  padding:18px;
}

.info h3{
  margin:0;
  font-size:20px;
}

.info p{
  margin-top:6px;
  opacity:.6;
  font-size:14px;
}

.contact{
  margin-top:80px;
  padding:30px;
  border-radius:20px;
  background:#0c1117;
  border:1px solid rgba(255,255,255,.06);
}

.contact-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:20px;
}

.box{
  background:#0a0f14;
  padding:16px;
  border-radius:12px;
}

.box p{
  opacity:.6;
  margin:0 0 6px 0;
  font-size:13px;
}

.box a{
  color:white;
  text-decoration:none;
}

@media(max-width:900px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  .contact-grid{
    grid-template-columns:1fr;
  }
}

@media(max-width:600px){
  .grid{
    grid-template-columns:1fr;
  }

  h1{
    font-size:36px;
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>Dukiee</h1>
  <p class="subtitle">Video Editor, Graphic Designer</p>

  <div class="grid">

    <a href="cfg.html" class="card">
      <div class="thumb">
        <img src="work1.jpg.png" alt="CFG">
      </div>
      <div class="info">
        <h3>CFG</h3>
        <p>POSM Campaign Series</p>
      </div>
    </a>

    <a href="chinggis.html" class="card">
      <div class="thumb">
        <img src="CB work1.jpg.jpg" alt="Chinggis Beer">
      </div>
      <div class="info">
        <h3>Chinggis Beer</h3>
        <p>Campaign Design Series</p>
      </div>
    </a>

    <a href="mobicom.html" class="card">
      <div class="thumb">
        <img src="mb1.jpg.jpeg" alt="Mobicom">
      </div>
      <div class="info">
        <h3>Mobicom</h3>
        <p>Social Campaign Series</p>
      </div>
    </a>

    <a href="video.html" class="card">
      <div class="thumb">
        <img src="video-cover.jpg.jpg" alt="Video">
      </div>
      <div class="info">
        <h3>Video</h3>
        <p>Reel / Motion</p>
      </div>
    </a>

  </div>

  <div class="contact">
    <h2>Let's work together</h2>

    <div class="contact-grid">
      <div class="box">
        <p>Email</p>
        <a href="mailto:dukdulguun888@gmail.com">dukdulguun888@gmail.com</a>
      </div>

      <div class="box">
        <p>Instagram</p>
        <a href="https://instagram.com/__dukiiee" target="_blank">instagram.com/__dukiiee</a>
      </div>

      <div class="box">
        <p>Phone</p>
        <a href="tel:+97695959727">+976 95959727</a>
      </div>
    </div>
  </div>

</div>

</body>
</html>
